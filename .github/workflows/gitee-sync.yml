name: gitee-sync
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
jobs:
  build:
    name: gitee-sync
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Gitee sync repo
        uses: xgfd3/hub-mirror-action@v1.4
        with:
          src: github/Shengwang-Community
          dst: gitee/agoraio-community
          white_list: "conversational-ai-quickstart-native"
          static_list: "conversational-ai-quickstart-native"
          cache_path: "./cache"
          dst_key: ${{ secrets.GITEE_PI_SSH }}
          dst_token: ${{ secrets.GITEE_PRIVATE_TOKEN }}
          force_update: true
          account_type: org
