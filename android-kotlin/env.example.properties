# ============================================
# ShengWang Configuration (Required)
# ============================================

# ShengWang App Credentials
# Get credentials from: https://console.shengwang.cn/
APP_ID=your_shengwang_app_id
APP_CERTIFICATE=your_shengwang_app_certificate


# ============================================
# Three-Tier AI Configuration
# ============================================

# LLM - DeepSeek (Required)
# Get API key from: https://platform.deepseek.com/
LLM_API_KEY=sk-your_llm_api_key
LLM_URL=your_llm_url
LLM_MODEL=your_llm_model

# STT - Microsoft Azure (Required)
# Get key from: https://portal.azure.cn/
STT_MICROSOFT_KEY=your_microsoft_key
STT_MICROSOFT_REGION=chinaeast2

# TTS - MiniMax (Required)
# Get API key from: https://platform.minimaxi.com/
TTS_MINIMAX_KEY=your_minimax_key
TTS_MINIMAX_MODEL=speech-01-turbo
TTS_MINIMAX_VOICE_ID=male-qn-qingse
TTS_MINIMAX_GROUP_ID=your_minimax_group_id